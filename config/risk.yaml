# =============================================================================
# Risk Management Configuration
# =============================================================================

risk:
  # Per-trade limits
  per_trade:
    max_risk_pct: 1.0               # Maximum risk per trade (% of balance)
    max_volume: 10.0                # Maximum lot size per trade

  # Position sizing method
  sizing:
    method: "fixed_percentage"       # Options: fixed_percentage, fixed_lot, volatility_adjusted
    fixed_lot_size: 0.01            # Used when method = fixed_lot
    volatility_lookback: 14         # ATR period for volatility-adjusted sizing

  # Portfolio limits
  portfolio:
    max_open_positions: 5           # Maximum concurrent open positions
    max_positions_per_symbol: 2     # Maximum positions on same symbol
    max_correlation_positions: 3    # Max positions on correlated instruments
    max_total_exposure: 30.0        # Max total lot exposure across all positions

  # Daily limits
  daily:
    max_daily_loss_pct: 3.0         # Stop trading after this % daily loss
    max_daily_trades: 20            # Maximum trades per day
    reset_hour_utc: 0               # When the daily counter resets (UTC hour)

  # Drawdown limits
  drawdown:
    max_drawdown_pct: 10.0          # Maximum drawdown before kill switch
    warning_drawdown_pct: 7.0       # Alert at this drawdown level
    recovery_required: true         # Must recover to warning level before resuming

  # Kill switch - emergency shutdown conditions
  kill_switch:
    enabled: true
    max_consecutive_losses: 5       # Halt after N consecutive losing trades
    abnormal_spread_multiplier: 3.0 # Halt if spread > normal * this multiplier
    max_slippage_pips: 5            # Halt if slippage exceeds this

  # Trading hours (UTC) - only trade during these windows
  trading_hours:
    enabled: false
    sessions:
      - name: "London"
        start: "07:00"
        end: "16:00"
      - name: "New York"
        start: "12:00"
        end: "21:00"
    excluded_days:                   # 0=Monday, 6=Sunday
      - 5  # Saturday
      - 6  # Sunday
